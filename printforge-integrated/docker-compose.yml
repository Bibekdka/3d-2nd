version: '3.8'

services:
  # Backend API Service
  backend:
    build: .
    container_name: printforge-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_PATH=/app/data/printforge_brain.db
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000,http://127.0.0.1:3000,http://127.0.0.1:8000
    volumes:
      - ./backend:/app/backend
      - ./config/.env:/app/config/.env
      - backend_data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - printforge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Nginx Reverse Proxy (for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: printforge-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - backend
  #   networks:
  #     - printforge-network

volumes:
  backend_data:
    driver: local

networks:
  printforge-network:
    driver: bridge
